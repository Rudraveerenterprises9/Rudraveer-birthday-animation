<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- WhatsApp & Social Media Sharing Optimization -->
    <meta property="og:title" content="Rudraveer's Royal 3D Birthday Invitation 🎁" />
    <meta property="og:description"
        content="Join us to celebrate Rudraveer's Birthday! 📅 23rd July 2026 at Hotel Royal Chetna. Tap to open your 3D interactive invitation." />
    <!-- NOTE: For WhatsApp to load the image perfectly, provide the full absolute URL if hosted, e.g. "https://yourwebsite.com/photo7.jpg" -->
    <meta property="og:image" content="photo7.jpg" />
    <meta property="og:type" content="website" />
    <meta name="description"
        content="Join us to celebrate Rudraveer's Birthday! 📅 23rd July 2026. Tap to open your 3D interactive invitation." />

    <title>Rudraveer's Royal 3D Birthday Invitation</title>
    <!-- Google Fonts: Elegant Royal Font for Headings, Poppins for Details -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #e8f4f8;
            /* Soft watercolor light blue */
            color: #0a3d91;
            /* Royal Blue */
        }

        /* 3D Canvas Background */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Initial Overlay Screen */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e8f4f8;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        #start-photo {
            position: relative;
            width: 400px;
            height: 621px;
            max-width: 100vw;
            max-height: 100vh;
            background: url('photo7.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 40px;
            box-shadow: 0 15px 50px rgba(10, 61, 145, 0.3);
        }

        #start-photo::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 61, 145, 0.8), transparent);
            pointer-events: none;
        }

        #start-btn {
            background: linear-gradient(135deg, #1e3a8a, #0a3d91);
            color: #fff;
            border: 2px solid #d4af37;
            /* Gold border to contrast with blue */
            padding: 12px 25px;
            font-size: 1.1rem;
            z-index: 2;
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            cursor: pointer;
            animation: pulseBtn 2s infinite;
            outline: none;
            text-align: center;
        }

        @keyframes pulseBtn {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(212, 175, 55, 0.8);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            }
        }

        /* Edge UI Layout */
        .edge-ui {
            position: fixed;
            left: 0;
            width: 100%;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            padding: 0 15px;
            opacity: 0;
        }

        #ui-top {
            top: 25px;
        }

        #ui-bottom {
            bottom: 25px;
        }

        /* Text Styling Optimized for Royal Blue Frames */
        .no-bg-text {
            color: #0a3d91;
            text-shadow:
                2px 2px 0px #fff,
                -2px -2px 0px #fff,
                2px -2px 0px #fff,
                -2px 2px 0px #fff,
                0px 4px 15px rgba(212, 175, 55, 0.4);
            /* Added soft gold shadow to pop against blue frames */
            margin-bottom: 5px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #1e3a8a;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            line-height: 1.1;
        }

        /* --- BOTTOM UI GLASSMORPHISM CARD --- */
        .bottom-card {
            background: rgba(255, 255, 255, 0.85);
            /* Clean white glass */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 15px 10px;
            width: 92%;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid rgba(212, 175, 55, 0.4);
            /* Subtle gold border */
            box-shadow: 0 10px 30px rgba(10, 61, 145, 0.15);
            /* Soft blue shadow */
        }

        .venue-info {
            margin-bottom: 15px;
        }

        .venue-info p {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.5;
            color: #0a3d91;
            /* Solid Royal Blue - NO messy shadows */
            margin-bottom: 5px;
        }

        .venue-info .highlight {
            color: #ff0000;
            /* Solid Gold */
            font-size: 1.05rem;
            font-weight: 800;
        }

        .contact-link {
            color: #0a3d91;
            text-decoration: none;
            font-weight: 800;
        }

        /* Compact Countdown Timer */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(10, 61, 145, 0.1);
            padding-top: 10px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-box .num {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff0000;
            /* Rich Gold */
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            /* Very light shadow for depth */
        }

        .time-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            color: #0a3d91;
            /* Royal Blue */
            margin-top: 2px;
        }

        .swipe-instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            pointer-events: none;
            z-index: 5;
            background: rgba(10, 61, 145, 0.85);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #d4af37;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.5s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 2.2rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            .venue-info p {
                font-size: 0.9rem;
            }

            .time-box .num {
                font-size: 1.6rem;
            }

            #ui-top {
                top: 15px;
            }

            #ui-bottom {
                bottom: 15px;
            }

            #start-btn {
                font-size: 1rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Audio Element -->
    <audio id="bg-music" src="bg-music.mp3" loop></audio>

    <!-- Start Overlay -->
    <div id="start-overlay">
        <div id="start-photo">
            <button id="start-btn">Tap to Open Rudraveer's Invitation 🎁</button>
        </div>
    </div>

    <!-- 3D WebGL Canvas -->
    <canvas id="webgl-canvas"></canvas>

    <div class="swipe-instruction" id="swipe-hint">👆 Swipe to Spin</div>

    <!-- UI Overlay: Edge Positioned, Clear Center -->
    <div class="edge-ui" id="ui-top">
        <h2 class="no-bg-text">You're Invited to Celebrate</h2>
        <h1 class="no-bg-text">Rudraveer's Birthday!</h1>
    </div>

    <div class="edge-ui" id="ui-bottom">
        <div class="bottom-card">
            <div class="venue-info">
                <p>📅 <span class="highlight">23rd July 2026 | 5:00 PM</span></p>
                <p>📍 Hotel Royal Chetna, Gami Tola, Katihar</p>
                <p>📞 RSVP: <a href="tel:+919110145291" class="contact-link">+91-9110145291</a></p>
            </div>
            <div class="countdown-container">
                <div class="time-box"><span class="num" id="cd-days">00</span><span class="label">Days</span></div>
                <div class="time-box"><span class="num" id="cd-hours">00</span><span class="label">Hrs</span></div>
                <div class="time-box"><span class="num" id="cd-mins">00</span><span class="label">Mins</span></div>
                <div class="time-box"><span class="num" id="cd-secs">00</span><span class="label">Secs</span></div>
            </div>
        </div>
    </div>

    <!-- Shop Details Floating at Absolute Bottom -->
    <div style="position: fixed; bottom: 5px; left: 0; width: 100%; text-align: center; z-index: 20; pointer-events: none;">
        <p style="font-family: 'Poppins', sans-serif; font-size: 0.7rem; color: #ffffff; text-shadow: 0px 1px 4px rgba(0,0,0,0.8); margin: 0; font-weight: 600; letter-spacing: 0.5px;">
            Designed by Rudraveer Enterprises | 📞 <a href="tel:7765884542" style="color: #ffd700; text-decoration: none; pointer-events: auto;">7765884542</a>
        </p>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. COUNTDOWN TIMER ---
        const initCountdown = () => {
            const targetDate = new Date("Jul 23, 2026 17:00:00").getTime();
            const elDays = document.getElementById('cd-days');
            const elHours = document.getElementById('cd-hours');
            const elMins = document.getElementById('cd-mins');
            const elSecs = document.getElementById('cd-secs');

            setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    elDays.innerText = "00"; elHours.innerText = "00";
                    elMins.innerText = "00"; elSecs.innerText = "00";
                    return;
                }

                elDays.innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                elHours.innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                elMins.innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                elSecs.innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }, 1000);
        };

        let isStarted = false;
        let scene, camera, renderer, burstParticles;

        // --- 2. THREE.JS SCENE SETUP ---
        const initThreeJS = () => {
            const canvas = document.getElementById('webgl-canvas');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe8f4f8);
            scene.fog = new THREE.FogExp2(0xe8f4f8, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 60);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            controls.maxPolarAngle = Math.PI / 2 + 0.15;
            controls.minPolarAngle = Math.PI / 2 - 0.15;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 15);
            scene.add(dirLight);

            const centerLight = new THREE.PointLight(0xffffff, 1.0, 100);
            centerLight.position.set(0, 5, 0);
            scene.add(centerLight);

            const animatedObjects = [];
            const allFrameBulbs = []; // Added for 7-color animation
            const colors = [0x1e3a8a, 0xffd700, 0x87ceeb, 0xffb6c1, 0xffffff];

            const textureLoader = new THREE.TextureLoader();
            const images = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 'photo5.jpg', 'photo6.jpg'];

            // 🔴 CHANGED: Radius reduced to close the gap between photos 🔴
            const galleryRadius = window.innerWidth < 600 ? 11 : 14;
            const targetWidth = window.innerWidth < 600 ? 10 : 12;
            const targetHeight = targetWidth * (4 / 3);
            const planeAspect = targetWidth / targetHeight;

            // 🔴 CHANGED: Rich Gold Photo Frames 🔴
            const metalMat = new THREE.MeshStandardMaterial({
                color: 0xffaa00, // Rich Gold
                metalness: 0.8,
                roughness: 0.15
            });

            images.forEach((imgSrc, index) => {
                textureLoader.load(imgSrc, (texture) => {
                    texture.encoding = THREE.sRGBEncoding;
                    texture.minFilter = THREE.LinearFilter;
                    texture.magFilter = THREE.LinearFilter;
                    texture.generateMipmaps = false;

                    const imageAspect = texture.image.width / texture.image.height;
                    if (imageAspect > planeAspect) {
                        const scale = planeAspect / imageAspect;
                        texture.repeat.set(scale, 1);
                        texture.offset.set((1 - scale) / 2, 0);
                    } else {
                        const scale = imageAspect / planeAspect;
                        texture.repeat.set(1, scale);
                        texture.offset.set(0, (1 - scale) / 2);
                    }

                    // Create a true 3D hollow frame using a Group
                    const frameGroup = new THREE.Group();

                    // 1. The Photo (Inset slightly back)
                    const geometry = new THREE.PlaneGeometry(targetWidth, targetHeight);
                    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                    const plane = new THREE.Mesh(geometry, material);
                    plane.position.z = -0.15; // Push photo back into the frame
                    frameGroup.add(plane);

                    const borderThickness = 0.5;
                    const frameDepth = 0.6; // How far the frame sticks out

                    // 2. The Backboard (Solid backing)
                    const backGeo = new THREE.BoxGeometry(targetWidth + borderThickness * 2, targetHeight + borderThickness * 2, 0.1);
                    const backMesh = new THREE.Mesh(backGeo, metalMat);
                    backMesh.position.z = -0.25;
                    frameGroup.add(backMesh);

                    // 3. The 4 Borders (Protruding forward)
                    const topGeo = new THREE.BoxGeometry(targetWidth + borderThickness * 2, borderThickness, frameDepth);
                    const topMesh = new THREE.Mesh(topGeo, metalMat);
                    topMesh.position.set(0, targetHeight / 2 + borderThickness / 2, 0);
                    frameGroup.add(topMesh);

                    const bottomMesh = new THREE.Mesh(topGeo, metalMat);
                    bottomMesh.position.set(0, -(targetHeight / 2 + borderThickness / 2), 0);
                    frameGroup.add(bottomMesh);

                    const sideGeo = new THREE.BoxGeometry(borderThickness, targetHeight, frameDepth);
                    const leftMesh = new THREE.Mesh(sideGeo, metalMat);
                    leftMesh.position.set(-(targetWidth / 2 + borderThickness / 2), 0, 0);
                    frameGroup.add(leftMesh);

                    const rightMesh = new THREE.Mesh(sideGeo, metalMat);
                    rightMesh.position.set(targetWidth / 2 + borderThickness / 2, 0, 0);
                    frameGroup.add(rightMesh);

                    // 4. Glowing Bulb Lights along the frame border
                    const bulbGeo = new THREE.SphereGeometry(0.1, 16, 16); // Increased ball size for better visibility
                    const bulbZ = frameDepth / 2;

                    const bX = targetWidth / 2 + borderThickness / 2;
                    const bY = targetHeight / 2 + borderThickness / 2;

                    const bulbsPositions = [];
                    const bCountX = 5;
                    const bCountY = 6;

                    // Order sequentially for "chaser" effect: Top, Right, Bottom, Left
                    for (let i = 0; i <= bCountX; i++) bulbsPositions.push({ x: THREE.MathUtils.lerp(-bX, bX, i / bCountX), y: bY });
                    for (let i = 1; i <= bCountY; i++) bulbsPositions.push({ x: bX, y: THREE.MathUtils.lerp(bY, -bY, i / bCountY) });
                    for (let i = 1; i <= bCountX; i++) bulbsPositions.push({ x: THREE.MathUtils.lerp(bX, -bX, i / bCountX), y: -bY });
                    for (let i = 1; i < bCountY; i++) bulbsPositions.push({ x: -bX, y: THREE.MathUtils.lerp(-bY, bY, i / bCountY) });

                    const frameBulbs = [];
                    bulbsPositions.forEach(pos => {
                        const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
                        bulb.position.set(pos.x, pos.y, bulbZ);
                        frameGroup.add(bulb);
                        frameBulbs.push(bulb);
                    });
                    allFrameBulbs.push(frameBulbs);

                    // Position the whole framed group in the circular gallery
                    const angle = (index / images.length) * Math.PI * 2;
                    frameGroup.position.x = Math.cos(angle) * galleryRadius;
                    frameGroup.position.z = Math.sin(angle) * galleryRadius;
                    frameGroup.rotation.y = -angle + Math.PI / 2;
                    scene.add(frameGroup);

                    animatedObjects.push({
                        isFrameGroup: true,
                        mesh: frameGroup,
                        floatSpeed: Math.random() * 0.01 + 0.005,
                        baseY: frameGroup.position.y,
                        time: Math.random() * Math.PI * 2
                    });
                });
            });

            // --- Realistic Balloons from Bottom ---
            const balloonGeo = new THREE.SphereGeometry(1, 32, 32);
            balloonGeo.scale(1, 1.2, 1); // Squish to look like a balloon
            const knotGeo = new THREE.ConeGeometry(0.15, 0.3, 16);
            knotGeo.translate(0, -1.2, 0);

            for (let i = 0; i < 50; i++) { // Increased quantity from 20 to 50
                const radius = Math.random() * 2.0 + 1.2; // Made them significantly bigger
                const bMat = new THREE.MeshStandardMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    roughness: 0.1,
                    metalness: 0.3,
                    transparent: true,
                    opacity: 0.85
                });
                const balloonGroup = new THREE.Group();
                balloonGroup.add(new THREE.Mesh(balloonGeo, bMat));
                balloonGroup.add(new THREE.Mesh(knotGeo, bMat));

                // Add a string
                const stringMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                const stringGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -1.3, 0),
                    new THREE.Vector3(0, -3.5, 0)
                ]);
                balloonGroup.add(new THREE.Line(stringGeo, stringMat));

                balloonGroup.scale.set(radius, radius, radius);

                // Start scattered across the entire vertical space so they appear immediately
                balloonGroup.position.set(
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 100, // Y scattered between -50 and 50
                    (Math.random() - 0.5) * 60 - 10
                );

                scene.add(balloonGroup);
                animatedObjects.push({
                    isBalloon: true,
                    mesh: balloonGroup,
                    speedY: Math.random() * 0.08 + 0.04,
                    wobbleSpeed: Math.random() * 0.03 + 0.01,
                    wobbleSize: Math.random() * 2 + 0.5,
                    baseX: balloonGroup.position.x,
                    time: Math.random() * Math.PI * 2
                });
            }

            // --- Constant Firework / Cracker Fountain from Bottom ---
            const fountainCount = 300;
            const fGeo = new THREE.BufferGeometry();
            const fPos = new Float32Array(fountainCount * 3);
            const fCol = new Float32Array(fountainCount * 3);
            const fVel = [];
            const fountainColors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0xff00ff];

            for (let i = 0; i < fountainCount; i++) {
                fPos[i * 3] = (Math.random() - 0.5) * 40;
                fPos[i * 3 + 1] = -30 - Math.random() * 20; // Start below
                fPos[i * 3 + 2] = (Math.random() - 0.5) * 40 - 5;

                fVel.push({
                    x: (Math.random() - 0.5) * 0.3,
                    y: Math.random() * 0.5 + 0.5, // Shoot upwards
                    z: (Math.random() - 0.5) * 0.3
                });

                const c = new THREE.Color(fountainColors[Math.floor(Math.random() * fountainColors.length)]);
                fCol[i * 3] = c.r; fCol[i * 3 + 1] = c.g; fCol[i * 3 + 2] = c.b;
            }
            fGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
            fGeo.setAttribute('color', new THREE.BufferAttribute(fCol, 3));

            const fMat = new THREE.PointsMaterial({
                size: 1.0,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const fountainParticles = new THREE.Points(fGeo, fMat);
            fountainParticles.userData = { velocities: fVel };
            scene.add(fountainParticles);

            const clock = new THREE.Clock();
            const tick = () => {
                if (isStarted) {
                    const elapsedTime = clock.getElapsedTime();
                    controls.update();

                    // Animate 7-color chasing bulbs fast
                    const rbColors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0xff00ff];
                    allFrameBulbs.forEach(bulbs => {
                        bulbs.forEach((bulb, i) => {
                            const colorIndex = Math.floor(elapsedTime * 20 + i) % rbColors.length;
                            bulb.material.color.setHex(rbColors[colorIndex]);
                        });
                    });

                    animatedObjects.forEach(obj => {
                        if (obj.isFrameGroup) {
                            obj.time += obj.floatSpeed;
                            const yOffset = Math.sin(obj.time) * 1.5;
                            obj.mesh.position.y = obj.baseY + yOffset;
                        } else if (obj.isBalloon) {
                            obj.time += obj.wobbleSpeed;
                            obj.mesh.position.y += obj.speedY;
                            obj.mesh.position.x = obj.baseX + Math.sin(obj.time) * obj.wobbleSize;

                            // Reset to bottom if it floats too high
                            if (obj.mesh.position.y > 50) {
                                obj.mesh.position.y = -50 - Math.random() * 20;
                                obj.baseX = (Math.random() - 0.5) * 60;
                            }
                        }
                    });

                    // Continuous Fountain / Crackers Animation
                    if (fountainParticles) {
                        const pos = fountainParticles.geometry.attributes.position.array;
                        const vels = fountainParticles.userData.velocities;

                        for (let i = 0; i < vels.length; i++) {
                            pos[i * 3] += vels[i].x;
                            pos[i * 3 + 1] += vels[i].y;
                            pos[i * 3 + 2] += vels[i].z;
                            vels[i].y -= 0.012; // Gravity pulling them down

                            // If fallen back down too far, reset to burst from bottom again
                            if (pos[i * 3 + 1] < -40 && vels[i].y < 0) {
                                pos[i * 3] = (Math.random() - 0.5) * 40;
                                pos[i * 3 + 1] = -30 - Math.random() * 10;
                                pos[i * 3 + 2] = (Math.random() - 0.5) * 40 - 5;
                                vels[i].x = (Math.random() - 0.5) * 0.3;
                                vels[i].y = Math.random() * 0.5 + 0.5; // Shoot up again
                                vels[i].z = (Math.random() - 0.5) * 0.3;
                            }
                        }
                        fountainParticles.geometry.attributes.position.needsUpdate = true;
                    }

                    if (burstParticles) {
                        const pos = burstParticles.geometry.attributes.position.array;
                        const vels = burstParticles.userData.velocities;
                        burstParticles.userData.age += 0.015;

                        for (let i = 0; i < vels.length; i++) {
                            pos[i * 3] += vels[i].x;
                            pos[i * 3 + 1] += vels[i].y;
                            pos[i * 3 + 2] += vels[i].z;
                            vels[i].y -= 0.04;
                        }
                        burstParticles.geometry.attributes.position.needsUpdate = true;
                        burstParticles.material.opacity = Math.max(0, 1 - (burstParticles.userData.age * 0.8));

                        if (burstParticles.userData.age > 1.5) {
                            scene.remove(burstParticles);
                            burstParticles = null;
                        }
                    }
                }
                renderer.render(scene, camera);
                window.requestAnimationFrame(tick);
            };
            tick();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            });
        };

        const triggerSparkleBurst = () => {
            const burstCount = 600;
            const bGeo = new THREE.BufferGeometry();
            const bPos = new Float32Array(burstCount * 3);
            const bCol = new Float32Array(burstCount * 3);
            const bVel = [];
            const startZ = window.innerWidth < 600 ? 15 : 20;

            for (let i = 0; i < burstCount; i++) {
                bPos[i * 3] = 0;
                bPos[i * 3 + 1] = 0;
                bPos[i * 3 + 2] = startZ;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = Math.random() * 1.5 + 0.5;

                bVel.push({
                    x: Math.sin(phi) * Math.cos(theta) * speed,
                    y: Math.sin(phi) * Math.sin(theta) * speed + 0.5,
                    z: Math.cos(phi) * speed
                });

                bCol[i * 3] = 1.0;
                bCol[i * 3 + 1] = 0.8 + Math.random() * 0.2;
                bCol[i * 3 + 2] = Math.random() * 0.5;
            }
            bGeo.setAttribute('position', new THREE.BufferAttribute(bPos, 3));
            bGeo.setAttribute('color', new THREE.BufferAttribute(bCol, 3));

            const bMat = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            burstParticles = new THREE.Points(bGeo, bMat);
            burstParticles.userData = { velocities: bVel, age: 0 };
            scene.add(burstParticles);
        };

        document.addEventListener('DOMContentLoaded', () => {
            initCountdown();
            initThreeJS();

            const startBtn = document.getElementById('start-btn');
            const overlay = document.getElementById('start-overlay');
            const bgMusic = document.getElementById('bg-music');
            const swipeHint = document.getElementById('swipe-hint');

            startBtn.addEventListener('click', () => {
                bgMusic.play().catch(e => console.log("Audio play blocked", e));
                triggerSparkleBurst();
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 1000);

                isStarted = true;
                const targetZ = window.innerWidth < 600 ? 25 : 30;
                gsap.to(camera.position, { x: 0, y: 0, z: targetZ, duration: 3, ease: "power3.out" });
                gsap.to(".edge-ui", { opacity: 1, duration: 2, delay: 1 });

                swipeHint.style.opacity = '1';
                setTimeout(() => { gsap.to(swipeHint, { opacity: 0, duration: 1 }); }, 4000);
            });

            document.addEventListener('touchstart', () => { if (isStarted) gsap.to(swipeHint, { opacity: 0, duration: 0.5 }); }, { once: true });
            document.addEventListener('mousedown', () => { if (isStarted) gsap.to(swipeHint, { opacity: 0, duration: 0.5 }); }, { once: true });
        });
    </script>
</body>

</html>
